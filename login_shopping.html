<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | MeWoot Shopping</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#e7e8e9",
                        "on-secondary-container": "#243c88",
                        "secondary": "#445aa7",
                        "background": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "on-primary-fixed": "#001551",
                        "surface-variant": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#434656",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#e3e6ff",
                        "surface-bright": "#f8f9fa",
                        "outline": "#737688",
                        "on-background": "#191c1d",
                        "primary": "#0041c8",
                        "error": "#ba1a1a",
                        "primary-container": "#0055ff",
                        "surface-container": "#edeeef",
                        "inverse-on-surface": "#f0f1f2",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#b6c4ff",
                        "surface-dim": "#d9dadb",
                        "secondary-container": "#95aafd",
                        "inverse-surface": "#2e3132",
                        "on-primary-fixed-variant": "#0039b3",
                        "on-surface": "#191c1d",
                        "surface-container-low": "#f3f4f5",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-headline {
            font-family: 'Manrope', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .alert.error {
            background-color: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #dc2626;
            display: block;
        }

        .alert.success {
            background-color: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
            display: block;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">

            <!-- Back link -->
            <a href="homepage.html"
                class="inline-flex items-center gap-1.5 text-[0.6875rem] uppercase tracking-widest font-semibold text-on-surface-variant hover:text-primary transition-colors mb-8">
                <span class="material-symbols-outlined text-base">arrow_back</span>
                Back to Home
            </a>

            <!-- Branding Header -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl mb-4"
                    style="background: linear-gradient(135deg, #0041c8 0%, #0055ff 100%);">
                    <span class="material-symbols-outlined text-white text-2xl"
                        style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">shopping_bag</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tighter text-primary font-headline mb-2">MeWoot Shopping
                </h1>
                <p class="text-on-surface-variant font-medium text-sm">Sign in to browse and order products</p>
            </div>

            <!-- Login Card -->
            <div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-sm border border-outline-variant/10">
                <div class="alert" id="alert"></div>

                <form id="loginForm" class="space-y-6">
                    <!-- Email -->
                    <div class="space-y-2">
                        <label
                            class="block text-[0.6875rem] uppercase tracking-widest font-semibold text-on-surface-variant"
                            for="email">Email Address</label>
                        <input
                            class="w-full bg-surface-container-low border-0 rounded-md py-3 px-4 text-on-surface placeholder-slate-400 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200"
                            id="email" name="email" placeholder="name@company.com" required type="email" />
                    </div>

                    <!-- Password -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label
                                class="block text-[0.6875rem] uppercase tracking-widest font-semibold text-on-surface-variant"
                                for="password">Password</label>
                            <a class="text-[0.6875rem] font-semibold text-primary hover:text-primary-container transition-colors uppercase tracking-wider"
                                href="#">Forgot password?</a>
                        </div>
                        <input
                            class="w-full bg-surface-container-low border-0 rounded-md py-3 px-4 text-on-surface placeholder-slate-400 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200"
                            id="password" name="password" placeholder="••••••••" required type="password" />
                    </div>

                    <!-- Submit -->
                    <button
                        class="w-full py-4 px-6 bg-primary text-white font-bold rounded-md shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-200 uppercase tracking-widest text-xs"
                        type="submit" id="loginBtn">
                        Enter Shopping
                    </button>
                </form>

                <!-- Divider -->
                <div class="mt-8 pt-8 border-t border-surface-container-high">
                    <p class="text-center text-sm text-on-surface-variant">
                        Don't have an account?
                        <a class="font-bold text-primary hover:underline ml-1" href="register.html">Register
                            here</a>
                    </p>
                </div>
            </div>

            <!-- Footer links -->
            <div class="mt-8 flex flex-wrap justify-center gap-x-6 gap-y-2">
                <a class="text-[0.6875rem] uppercase tracking-widest font-semibold text-slate-400 hover:text-primary transition-colors"
                    href="homepage.html">Home</a>
                <a class="text-[0.6875rem] uppercase tracking-widest font-semibold text-slate-400 hover:text-primary transition-colors"
                    href="login_inventory.html">Inventory Login</a>
            </div>
        </div>
    </main>

    <!-- Background decoration -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
    </div>

    <footer class="w-full py-8 border-t border-slate-200/50 bg-slate-50 mt-auto">
        <div class="flex flex-col md:flex-row justify-between items-center px-12 w-full gap-4">
            <div class="text-lg font-bold text-slate-900 font-headline">MeWoot</div>
            <div class="text-[0.6875rem] uppercase tracking-widest font-semibold text-slate-400">© 2025 MeWoot. All
                rights reserved.</div>
            <div class="flex gap-6">
                <a class="text-[0.6875rem] uppercase tracking-widest font-semibold text-slate-400 hover:text-blue-700 transition-all"
                    href="#">Privacy Policy</a>
                <a class="text-[0.6875rem] uppercase tracking-widest font-semibold text-slate-400 hover:text-blue-700 transition-all"
                    href="#">Terms</a>
            </div>
        </div>
    </footer>

    <script>
        const form = document.getElementById("loginForm");
        const alertEl = document.getElementById("alert");
        const loginBtn = document.getElementById("loginBtn");

        function showAlert(message, type) {
            alertEl.textContent = message;
            alertEl.className = "alert " + type;
        }

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                showAlert("Please enter both email and password.", "error");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "Logging in...";

            try {
                const response = await fetch("api/login.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    showAlert("Login successful! Redirecting...", "success");
                    localStorage.setItem("user_id", result.user_id);
                    localStorage.setItem("user_name", result.full_name);
                    localStorage.setItem("user_email", result.email);
                    setTimeout(() => {
                        window.location.href = "shopping.html";
                    }, 1500);
                } else {
                    showAlert(result.message, "error");
                }

            } catch (err) {
                console.error("Error:", err);
                showAlert("Could not connect to server. Please try again.", "error");
            }

            loginBtn.disabled = false;
            loginBtn.textContent = "Enter Shopping";
        });
    </script>
</body>

</html>
