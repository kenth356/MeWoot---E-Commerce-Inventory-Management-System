<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | MeWoot</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-high": "#e7e8e9",
            "on-error": "#ffffff",
            "tertiary-fixed": "#ffdbd1",
            "secondary-fixed-dim": "#b6c4ff",
            "primary-fixed-dim": "#b6c4ff",
            "on-secondary-container": "#243c88",
            "secondary": "#445aa7",
            "background": "#f8f9fa",
            "surface-container-highest": "#e1e3e4",
            "on-tertiary-fixed-variant": "#872100",
            "on-primary-fixed": "#001551",
            "surface-variant": "#e1e3e4",
            "surface-container-lowest": "#ffffff",
            "on-surface-variant": "#434656",
            "on-primary": "#ffffff",
            "on-primary-container": "#e3e6ff",
            "surface-bright": "#f8f9fa",
            "outline": "#737688",
            "on-error-container": "#93000a",
            "tertiary": "#972500",
            "surface": "#f8f9fa",
            "primary-fixed": "#dce1ff",
            "on-tertiary-container": "#ffe1d9",
            "tertiary-container": "#c13301",
            "surface-tint": "#004dea",
            "on-secondary-fixed-variant": "#2b418d",
            "outline-variant": "#c3c5d9",
            "on-background": "#191c1d",
            "primary": "#0041c8",
            "error": "#ba1a1a",
            "primary-container": "#0055ff",
            "surface-container": "#edeeef",
            "inverse-on-surface": "#f0f1f2",
            "tertiary-fixed-dim": "#ffb5a0",
            "on-secondary": "#ffffff",
            "inverse-primary": "#b6c4ff",
            "surface-dim": "#d9dadb",
            "error-container": "#ffdad6",
            "secondary-container": "#95aafd",
            "secondary-fixed": "#dce1ff",
            "on-tertiary-fixed": "#3b0900",
            "inverse-surface": "#2e3132",
            "on-primary-fixed-variant": "#0039b3",
            "on-surface": "#191c1d",
            "on-tertiary": "#ffffff",
            "surface-container-low": "#f3f4f5",
            "on-secondary-fixed": "#001551"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .font-headline {
      font-family: 'Manrope', sans-serif;
    }

    .blob-1 {
      position: absolute;
      top: -80px;
      right: -60px;
      width: 520px;
      height: 520px;
      background: linear-gradient(135deg, #0041c8 0%, #3b76f5 60%, #87b0ff 100%);
      border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
      opacity: 0.18;
    }

    .blob-2 {
      position: absolute;
      bottom: -100px;
      left: -80px;
      width: 420px;
      height: 420px;
      background: linear-gradient(135deg, #0055ff 0%, #5c8fff 100%);
      border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%;
      opacity: 0.13;
    }

    .streak {
      position: absolute;
      top: 30%;
      right: 0;
      width: 160px;
      height: 340px;
      background: linear-gradient(180deg, #0041c8 0%, #5c8fff 100%);
      border-radius: 80px 0 0 80px;
      opacity: 0.12;
      transform: translateY(-50%);
    }

    .streak-thin {
      position: absolute;
      top: 60%;
      left: 0;
      width: 90px;
      height: 200px;
      background: linear-gradient(180deg, #3b76f5 0%, #87b0ff 100%);
      border-radius: 0 60px 60px 0;
      opacity: 0.10;
    }

    .field-input:focus {
      background: #fff;
      border-color: #0041c8;
      box-shadow: 0 0 0 3px rgba(0, 65, 200, 0.10);
      outline: none;
    }

    .submit-btn {
      background: linear-gradient(135deg, #0041c8 0%, #0055ff 100%);
      box-shadow: 0 4px 16px rgba(0, 65, 200, 0.25);
      transition: opacity 0.2s, transform 0.15s;
    }

    .submit-btn:hover {
      opacity: 0.92;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      display: none;
    }

    .alert.error {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #fcd0d0;
      display: block;
    }

    .alert.success {
      background: #f0fff4;
      color: #1a7a3c;
      border: 1px solid #c3f0d0;
      display: block;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body class="min-h-screen bg-[#f0f4ff] overflow-x-hidden">

  <div class="fixed inset-0 z-0 pointer-events-none">
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="streak"></div>
    <div class="streak-thin"></div>
  </div>

  <!-- Navbar -->
  <nav
    class="fixed top-0 w-full z-50 flex items-center justify-between px-10 h-16 bg-white/85 backdrop-blur-md border-b border-[#0041c8]/[0.08]">
    <div class="font-headline text-[1.2rem] font-extrabold text-primary tracking-tight">MeWoot</div>
    <a href="homepage.html"
      class="text-[0.6875rem] uppercase tracking-widest font-semibold text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
      <span class="material-symbols-outlined" style="font-size:1rem">arrow_back</span>Back to Home
    </a>
  </nav>

  <div class="relative z-10 min-h-screen flex items-center justify-center px-6 pt-[84px] pb-10">
    <div class="w-full max-w-[420px] bg-white/[0.96] rounded-[20px] px-11 pt-11 pb-10
                shadow-[0_8px_48px_rgba(0,65,200,0.10),0_2px_12px_rgba(0,0,0,0.06)]
                border border-[#0041c8]/[0.08]">

      <h2 class="font-headline text-[1.8rem] font-extrabold text-gray-900 mb-1">Create Account</h2>
      <p class="text-sm text-slate-500 mb-8">Establish your professional workspace.</p>

      <div class="alert rounded-[10px] px-[14px] py-3 text-sm font-medium mb-5" id="alert"></div>

      <form id="registerForm">
        <div class="mb-[18px]">
          <label for="name" class="block text-[0.68rem] uppercase tracking-widest font-bold text-slate-400 mb-1.5">Full
            Name</label>
          <input id="name" type="text" placeholder="Alexander Thorne" required
            class="field-input w-full px-[14px] py-3 bg-slate-100 border-[1.5px] border-transparent rounded-[10px] text-sm text-slate-800 placeholder-slate-300 transition-all duration-200">
        </div>
        <div class="mb-[18px]">
          <label for="email" class="block text-[0.68rem] uppercase tracking-widest font-bold text-slate-400 mb-1.5">Work
            Email</label>
          <input id="email" type="email" placeholder="a.thorne@company.com" required
            class="field-input w-full px-[14px] py-3 bg-slate-100 border-[1.5px] border-transparent rounded-[10px] text-sm text-slate-800 placeholder-slate-300 transition-all duration-200">
        </div>
        <div class="mb-[18px]">
          <label for="password"
            class="block text-[0.68rem] uppercase tracking-widest font-bold text-slate-400 mb-1.5">Password</label>
          <input id="password" type="password" placeholder="••••••••••••" required
            class="field-input w-full px-[14px] py-3 bg-slate-100 border-[1.5px] border-transparent rounded-[10px] text-sm text-slate-800 placeholder-slate-300 transition-all duration-200">
        </div>
        <div class="mb-[18px]">
          <label for="confirm_password"
            class="block text-[0.68rem] uppercase tracking-widest font-bold text-slate-400 mb-1.5">Confirm
            Password</label>
          <input id="confirm_password" type="password" placeholder="••••••••••••" required
            class="field-input w-full px-[14px] py-3 bg-slate-100 border-[1.5px] border-transparent rounded-[10px] text-sm text-slate-800 placeholder-slate-300 transition-all duration-200">
        </div>
        <button
          class="submit-btn w-full mt-2.5 py-[14px] text-white rounded-[10px] text-sm font-bold tracking-[0.04em] cursor-pointer border-none"
          type="submit" id="submitBtn">
          Register
        </button>
      </form>

      <div class="mt-6 pt-5 border-t border-slate-100 text-center text-[0.85rem] text-slate-500">
        Already have an account?
        <a href="login_shopping.html" class="text-primary font-bold no-underline hover:underline">Log in at homepage</a>
      </div>

    </div>
  </div>

  <script>
    const form = document.getElementById("registerForm");
    const alert = document.getElementById("alert");
    const submitBtn = document.getElementById("submitBtn");

    function showAlert(message, type) {
      alert.textContent = message;
      alert.className = "alert rounded-[10px] px-[14px] py-3 text-sm font-medium mb-5 " + type;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const full_name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm_password = document.getElementById("confirm_password").value;

      if (!full_name || !email || !password) { showAlert("All fields are required.", "error"); return; }
      if (password !== confirm_password) { showAlert("Passwords do not match.", "error"); return; }
      if (password.length < 8) { showAlert("Password must be at least 8 characters.", "error"); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = "Registering...";

      try {
        const response = await fetch("api/register.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ full_name, email, password, confirm_password })
        });

        const result = await response.json();

        if (result.success) {
          showAlert("Account created successfully! Redirecting to login...", "success");
          form.reset();
          setTimeout(() => { window.location.href = "login_shopping.html"; }, 2000);
        } else {
          showAlert(result.message, "error");
        }
      } catch (err) {
        console.error("Error:", err);
        showAlert("Could not connect to server. Please try again.", "error");
      }

      submitBtn.disabled = false;
      submitBtn.textContent = "Register";
    });
  </script>
</body>

</html>
